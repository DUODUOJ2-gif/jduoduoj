<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DUODUO2 - DOUBLE THE JOY</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
      color: #3e2e1f;
      background-color: #fff8f2;
      line-height: 1.6;
    }

    /* ========== 第一屏：视频背景 ========== */
    #hero {
      position: relative;
      height: 100vh;
      min-height: 600px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      overflow: hidden;
      color: #fff;
    }

    .video-background {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
    }

    /* 半透明遮罩保证文字清晰 */
    .hero-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.25);
      z-index: -1;
    }

    .hero-content {
      z-index: 2;
      padding: 1rem;
      animation: fadeInUp 1s ease;
    }

    .brand-name {
      font-size: clamp(3rem, 10vw, 6rem);
      font-weight: 900;
      letter-spacing: 0.1em;
      text-shadow: 2px 4px 12px rgba(0,0,0,0.3);
      margin-bottom: 0.2em;
      color: #FFD966;
    }

    .slogan {
      font-size: clamp(1.2rem, 3vw, 2rem);
      font-weight: 300;
      letter-spacing: 0.2em;
      margin-bottom: 2.5rem;
      text-shadow: 1px 2px 6px rgba(0,0,0,0.3);
    }

    .enter-btn {
      background: #FDB813;
      color: #3e2e1f;
      border: none;
      padding: 1rem 2.5rem;
      font-size: 1.2rem;
      font-weight: bold;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      letter-spacing: 0.05em;
    }

    .enter-btn:hover {
      background: #FFA000;
      transform: translateY(-3px);
      box-shadow: 0 12px 24px rgba(0,0,0,0.25);
    }

    .small-domain {
      position: absolute;
      bottom: 20px;
      right: 30px;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.8);
      z-index: 2;
      letter-spacing: 0.1em;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ========== 第二屏：五个小图片 ========== */
   #selection {
  background-image: url('https://github.com/DUODUOJ2-gif/jduoduoj/blob/main/2.jpg?raw=true');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  padding: 4rem 1rem 3rem;
  text-align: center;
  position: relative;
  z-index: 1;
}

    .section-title {
      font-size: 2.2rem;
      font-weight: 800;
      color: #E07B39;
      margin-bottom: 3rem;
      letter-spacing: 0.05em;
    }

    .cards-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .card {
      background: #fff;
      border-radius: 24px;
      padding: 1.5rem 1rem;
      width: 200px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.05);
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 15px 30px rgba(0,0,0,0.1);
      border: 2px solid #FDB813;
    }

    .card img {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 1rem;
      border: 4px solid #FFE0B2;
      transition: border-color 0.3s;
    }

    .card:hover img {
      border-color: #FDB813;
    }

    .card-label {
      font-weight: 700;
      font-size: 1.1rem;
      color: #6B4226;
    }

    /* ========== 第三屏：产品展示 ========== */
  #product-display {
  background-image: url('https://github.com/DUODUOJ2-gif/jduoduoj/blob/main/3.jpg?raw=true');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  padding: 3rem 1rem 5rem;
  min-height: 80vh;
  position: relative;
  z-index: 1;
}

    .product-wrapper {
      max-width: 1000px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 3rem;
      background: #fff;
      border-radius: 40px;
      padding: 2rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.05);
      transition: opacity 0.5s ease, transform 0.5s ease;
      opacity: 1;
      transform: translateY(0);
    }

    .product-wrapper.fade-out {
      opacity: 0;
      transform: translateY(20px);
    }

    .product-image img {
      width: 300px;
      max-width: 100%;
      height: auto;
      border-radius: 30px;
      object-fit: contain;
    }

    .product-info {
      flex: 1;
      min-width: 280px;
    }

    .product-name {
      font-size: 2rem;
      font-weight: 800;
      color: #E07B39;
      margin-bottom: 0.5rem;
    }

    .product-price {
      font-size: 1.8rem;
      font-weight: 700;
      color: #6B4226;
      margin-bottom: 1rem;
    }

    .product-rating {
      color: #FFB300;
      font-size: 1.3rem;
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .product-desc {
      font-size: 1.1rem;
      color: #5D4A37;
      margin-bottom: 2rem;
      line-height: 1.8;
    }

    .amazon-btn {
      display: inline-block;
      background: #FDB813;
      color: #2E1C0B;
      font-weight: bold;
      padding: 0.8rem 2.5rem;
      border-radius: 50px;
      text-decoration: none;
      font-size: 1.2rem;
      transition: all 0.3s;
      box-shadow: 0 6px 14px rgba(0,0,0,0.1);
      border: none;
      cursor: pointer;
    }

    .amazon-btn:hover {
      background: #E5A800;
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.15);
    }

    /* 页脚 */
    footer {
      background: #E07B39;
      color: #FFFBF5;
      text-align: center;
      padding: 2rem;
      font-size: 0.95rem;
    }

    footer a {
      color: #FFE0B2;
      text-decoration: none;
    }

    .footer-slogan {
      font-size: 1.1rem;
      font-weight: 600;
      margin: 0.8rem 0;
    }

    @media (max-width: 768px) {
      .product-wrapper {
        flex-direction: column;
        text-align: center;
      }
      .product-image img {
        width: 250px;
      }
      .card {
        width: 140px;
      }
    }
  </style>
</head>
<body>

  <!-- ================= 第一屏 ================= -->
  <section id="hero">
    <!-- 替换以下 src 为你自己的背景视频（MP4）或 GIF 路径 -->
    <video class="video-background" autoplay muted loop playsinline>
      <source src="https://raw.githubusercontent.com/DUODUOJ2-gif/jduoduoj/main/DUODUOJ2.mp4" type="video/mp4">4" type="video/mp4">
      <!-- 如果无法加载视频，显示背景色 -->
      <img src="https://placekitten.com/1920/1080" alt="fallback image" style="display:none;">
    </video>
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <p class="slogan">DOUBLE THE JOY</p>
      <button class="enter-btn" onclick="scrollToSection('selection')">点击开启双倍快乐 →</button>
    </div>
    <div class="small-domain">startatduoduo2.com</div>
  </section>

  <!-- ================= 第二屏：五个小图片 ================= -->
  <section id="selection">
    <h2 class="section-title">CHOOSE YOUR DUO STYLE</h2>
    <div class="cards-container">
      <!-- 每个卡片绑定 onclick，传递产品索引 (0~4) -->
      <div class="card" onclick="switchProduct(0)">
        <img src="https://img.icons8.com/color/200/dog-toy.png" alt="顽皮双宠">
        <span class="card-label">顽皮双宠</span>
      </div>
      <div class="card" onclick="switchProduct(1)">
        <img src="https://img.icons8.com/color/200/dog-bed.png" alt="温暖窝垫">
        <span class="card-label">温暖窝垫</span>
      </div>
      <div class="card" onclick="switchProduct(2)">
        <img src="https://img.icons8.com/color/200/dog-backpack.png" alt="时尚出行">
        <span class="card-label">时尚出行</span>
      </div>
      <div class="card" onclick="switchProduct(3)">
        <img src="https://img.icons8.com/color/200/dog-bone.png" alt="洁齿乐趣">
        <span class="card-label">洁齿乐趣</span>
      </div>
      <div class="card" onclick="switchProduct(4)">
        <img src="https://img.icons8.com/color/200/dog-training.png" alt="安心训练">
        <span class="card-label">安心训练</span>
      </div>
    </div>
  </section>

  <!-- ================= 第三屏：产品展示 ================= -->
  <section id="product-display">
    <div class="product-wrapper" id="productContainer">
      <!-- 内容由 JavaScript 动态填充 -->
    </div>
  </section>

 <!-- ================= 页脚 ================= -->
  <footer>
    <p class="footer-slogan">🐕 GOD SPELLED 'DUO' BACKWARDS TO NAME YOUR DOG ❤️</p >
    <p>🐾 2026 DUODUO2 · <a href=" " target="_blank" rel="noopener">startatduoduo2.com</a ></p >
    <p style="margin-top:0.5rem;">
      <span style="font-size:1.5rem; margin:0 0.5rem;">🐶</span>
      <span style="font-size:1.5rem; margin:0 0.5rem;">🛒</span>
      <span style="font-size:1.5rem; margin:0 0.5rem;">✨</span>
    </p >
  </footer>

  <script>

    // ========== 产品数据（可替换为真实亚马逊链接） ==========
    const products = [
      {
        name: "DUODUO2 双倍玩具套装",
        price: "$24.99",
        rating: "★★★★☆",
        desc: "专为多狗家庭设计，耐磨咬胶材质，附带发声器，让毛孩子双倍开心。",
        img: "https://img.icons8.com/color/400/dog-toy.png",
        amazonLink: "https://www.amazon.com/dp/B098PF4NPQ?tag=duoduoj2-20"
      },
      {
        name: "DUODUO2 豪华云感狗床",
        price: "$49.99",
        rating: "★★★★★",
        desc: "双倍加厚记忆棉，可拆洗绒面外套，给狗狗云端般的舒适睡眠。",
        img: "https://img.icons8.com/color/400/dog-bed.png",
        amazonLink: "https://www.amazon.com/dp/B0BPDQJ4G4?tag=duoduoj2-20"
      },
      {
        name: "DUODUO2 双包出行背包",
        price: "$39.99",
        rating: "★★★★☆",
        desc: "一包携带两宠，透气网窗设计，减震肩带，让出行更轻松。",
        img: "https://img.icons8.com/color/400/dog-backpack.png",
        amazonLink: "https://www.amazon.com/dp/B08FJ655HL?tag=duoduoj2-20"
      },
      {
        name: "DUODUO2 双效洁齿棒",
        price: "$15.99",
        rating: "★★★★☆",
        desc: "清新口气 + 去除牙垢，双重功效，狗狗爱咬的洁齿零食。",
        img: "https://img.icons8.com/color/400/dog-bone.png",
        amazonLink: "https://www.amazon.com/dp/B09JSGDD35?tag=duoduoj2-20"
      },
      {
        name: "DUODUO2 双响训练响片",
        price: "$9.99",
        rating: "★★★★☆",
        desc: "双频响片设计，声音清脆一致，帮助快速建立行为反射。",
        img: "https://img.icons8.com/color/400/dog-training.png",
        amazonLink: "https://www.amazon.com/dp/B07LFS84SC?tag=duoduoj2-20"
      }
    ];

    // 当前展示的产品索引
    let currentIndex = 0;

    // 初始化：显示第一个产品
    window.onload = function() {
      renderProduct(0);
    };

    // 渲染产品
    function renderProduct(index) {
      const container = document.getElementById('productContainer');
      const p = products[index];
      container.innerHTML = `
        <div class="product-image">
          <img src="${p.img}" alt="${p.name}">
        </div>
        <div class="product-info">
          <h2 class="product-name">${p.name}</h2>
          <div class="product-price">${p.price}</div>
          <div class="product-rating">${p.rating} <span style="font-size:0.9rem; color:#888;">(200+ reviews)</span></div>
          <p class="product-desc">${p.desc}</p>
          <a href="${p.amazonLink}" target="_blank" class="amazon-btn" rel="sponsored">?? Buy on Amazon</a>
        </div>
      `;
    }

    // 切换产品（点击第二屏卡片调用）
    function switchProduct(index) {
      if (currentIndex === index) {
        // 如果点击的是同一个产品，只滚动到第三屏
        scrollToSection('product-display');
        return;
      }
      currentIndex = index;
      
      // 添加淡出效果
      const container = document.getElementById('productContainer');
      container.classList.add('fade-out');
      
      setTimeout(() => {
        renderProduct(index);
        container.classList.remove('fade-out');
      }, 300);
      
      // 平滑滚动到第三屏
      scrollToSection('product-display');
    }

    // 平滑滚动辅助函数
    function scrollToSection(id) {
      const target = document.getElementById(id);
      if (target) {
        target.scrollIntoView({ behavior: 'smooth' });
      }
    }
  </script>

</body>
</html>

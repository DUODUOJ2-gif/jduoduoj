<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DUODUO2 - DOUBLE THE JOY</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
      color: #3e2e1f;
      background-color: #fff8f2;
      line-height: 1.6;
    }

    /* ========== 第一屏：视频背景（保持不变） ========== */
    #hero {
      position: relative;
      height: 100vh;
      min-height: 600px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      overflow: hidden;
      color: #fff;
    }

    .video-background {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
    }

    .hero-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.25);
      z-index: -1;
    }

    .hero-content {
      z-index: 2;
      padding: 1rem;
      animation: fadeInUp 1s ease;
    }

    .brand-name {
      font-size: clamp(3rem, 10vw, 6rem);
      font-weight: 900;
      letter-spacing: 0.1em;
      text-shadow: 2px 4px 12px rgba(0,0,0,0.3);
      margin-bottom: 0.2em;
      color: #FFD966;
    }

    .slogan {
      font-size: clamp(1.2rem, 3vw, 2rem);
      font-weight: 300;
      letter-spacing: 0.2em;
      margin-bottom: 2.5rem;
      text-shadow: 1px 2px 6px rgba(0,0,0,0.3);
    }

    .enter-btn {
      background: #FDB813;
      color: #3e2e1f;
      border: none;
      padding: 1rem 2.5rem;
      font-size: 1.2rem;
      font-weight: bold;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      letter-spacing: 0.05em;
    }

    .enter-btn:hover {
      background: #FFA000;
      transform: translateY(-3px);
      box-shadow: 0 12px 24px rgba(0,0,0,0.25);
    }

    .small-domain {
      position: absolute;
      bottom: 20px;
      right: 30px;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.8);
      z-index: 2;
      letter-spacing: 0.1em;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ========== 第二屏：完整展示背景大图 + 卡片 ========== */
    #selection {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      background-image: url('https://github.com/DUODUOJ2-gif/jduoduoj/blob/main/2.jpg?raw=true');
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      background-color: #FFF3E8;
      padding: 4rem 2rem;
    }

    #selection::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(255, 248, 245, 0.55);
      z-index: 0;
    }

    .section-title,
    .cards-container {
      position: relative;
      z-index: 2;
    }

    .section-title {
      font-size: 2.2rem;
      font-weight: 800;
      color: #E07B39;
      margin-bottom: 3rem;
      letter-spacing: 0.05em;
    }

    .cards-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .card {
      background: #fff;
      border-radius: 24px;
      padding: 1.5rem 1rem;
      width: 200px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.05);
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 15px 30px rgba(0,0,0,0.1);
      border: 2px solid #FDB813;
    }

    .card img {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 1rem;
      border: 4px solid #FFE0B2;
      transition: border-color 0.3s;
    }

    .card:hover img {
      border-color: #FDB813;
    }

    .card-label {
      font-weight: 700;
      font-size: 1.1rem;
      color: #6B4226;
    }

    footer {
      background: #E07B39;
      color: #FFFBF5;
      text-align: center;
      padding: 2rem;
      font-size: 0.95rem;
    }

    footer a {
      color: #FFE0B2;
      text-decoration: none;
    }

    .footer-slogan {
      font-size: 1.1rem;
      font-weight: 600;
      margin: 0.8rem 0;
    }

    @media (max-width: 768px) {
      .card {
        width: 140px;
      }
    }
  </style>
</head>
<body>

  <!-- ================= 第一屏 ================= -->

    </div>

      </a>
      <a href="product2.html" class="card">

      <a href="product3.html" class="card">

      <a href="product4.html" class="card">

  <footer>
    <p class="footer-slogan">🐾 GOD SPELLED 'DUO' BACKWARDS TO NAME YOUR DOG 🐾</p>
    <p>© 2026 DUODUO2 · <a href="https://startatduoduo2.com" target="_blank" rel="noopener noreferrer">startatduoduo2.com</a></p>
    <p style="margin-top:0.5rem;">
      <span style="font-size:1.5rem; margin:0 0.5rem;">🐶</span>
      <span style="font-size:1.5rem; margin:0 0.5rem;">📸</span>
      <span style="font-size:1.5rem; margin:0 0.5rem;">🎵</span>
    </p>
  </footer>

</body>
</html>
